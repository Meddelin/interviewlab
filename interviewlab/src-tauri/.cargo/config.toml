# Build config for the ASR engine (Milestone 4, whisper-rs).
#
# whisper-rs-sys runs `bindgen` to generate its FFI bindings, which needs libclang.
# This machine has no system LLVM, so we point bindgen at the libclang.dll that ships
# in the pip `libclang` package (installed into the user site-packages).
#
# bindgen/libclang must also be told to TARGET MSVC and given the MSVC + Windows SDK
# include dirs (clang ignores MSVC's INCLUDE env var). Without this, clang falls back
# to glibc-shaped headers and emits `_IO_FILE`/`fpos_t` layout asserts (216-byte FILE)
# that overflow under MSVC (where FILE is the tiny `struct _iobuf`) — a compile error.
# We DON'T set WHISPER_DONT_GENERATE_BINDINGS: the crate's bundled bindings.rs is itself
# glibc-shaped and hits the exact same overflow, so real (MSVC-correct) generation is
# the only thing that compiles here.
#
# CMake (from VS BuildTools) compiles whisper.cpp; it isn't on PATH, so point the
# `cmake` crate at it via CMAKE. The `cc`/`cmake` crates locate cl.exe via vswhere.
#
# ponytail: this is the minimal env to get a CPU whisper.cpp build without installing a
# full LLVM. CUDA is NOT enabled here (no CUDA Toolkit / nvcc — see asr.rs); the CUDA
# rebuild is a later step and reuses this same bindgen setup.
[env]
LIBCLANG_PATH = "C:\\Users\\stas\\AppData\\Roaming\\Python\\Python314\\site-packages\\clang\\native"
BINDGEN_EXTRA_CLANG_ARGS = "--target=x86_64-pc-windows-msvc -fms-compatibility -fms-extensions -fdelayed-template-parsing -isystem \"C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\VC\\Tools\\MSVC\\14.51.36231\\include\" -isystem \"C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\ucrt\" -isystem \"C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\shared\" -isystem \"C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\um\" -isystem \"C:\\Program Files (x86)\\Windows Kits\\10\\Include\\10.0.26100.0\\winrt\""
CMAKE = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\Common7\\IDE\\CommonExtensions\\Microsoft\\CMake\\CMake\\bin\\cmake.exe"
