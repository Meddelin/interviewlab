# Release: build UNSIGNED installers on every platform and attach them to a GitHub Release.
#
# Focus = Mac (Apple Silicon, Metal + CoreML/ANE — see docs/mac-build.md). Windows ships a
# default CPU build (no CUDA feature; GitHub-hosted runners have no Nvidia GPU). The CUDA
# build is a self-hosted-runner follow-up — see docs/release.md (a commented job is left below).
#
# NO code signing / notarization: we deliberately set NO Apple or Windows signing secrets, so
# tauri-action produces unsigned artifacts. Users bypass Gatekeeper / SmartScreen per docs/release.md.
# Signing + notarization is a separate future task.
name: release

on:
  push:
    tags:
      - "v*"            # cut a release by pushing a tag, e.g. `git tag v2.0.0 && git push --tags`
  workflow_dispatch: {} # also runnable by hand from the Actions tab (builds, attaches to a draft)

# tauri-action needs to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false   # one platform failing must not cancel the others (Mac is the priority)
      matrix:
        include:
          # ---- MAIN TARGET: macOS Apple Silicon (arm64). Metal GPU + CoreML/ANE encoder. ----
          # macos-14+ runners are arm64 and ship Xcode CLT (clang + macOS SDK; Metal is in the SDK).
          - platform: macos-14
            args: "--target aarch64-apple-darwin --features metal,coreml"
            rust_target: aarch64-apple-darwin
          # ---- Windows: GPU (CUDA) build. nvcc compiles the whisper.cpp CUDA kernels in CI WITHOUT
          #      a physical GPU (a GPU is only needed at runtime). Target hardware is Windows+Nvidia,
          #      so we ship ONLY the CUDA build (no CPU variant). sherpa libs come via cargo build-script. ----
          # windows-2022 = VS 2022 / MSVC 14.4x. NOT windows-latest: that now ships VS 2026 / MSVC
          # 14.51, whose host_config.h check CUDA 12.6 rejects ("unsupported Visual Studio version").
          - platform: windows-2022
            args: "--features cuda"
            rust_target: x86_64-pc-windows-msvc
            cuda: true

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: interviewlab/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # Cache the Rust build (whisper.cpp + sherpa-onnx compile is heavy). Keyed per-platform.
      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: interviewlab/src-tauri

      # --- Windows GPU build toolchain: MSVC env + Ninja + CUDA Toolkit. nvcc needs no GPU to
      #     COMPILE the kernels; the toolkit just provides nvcc + cuBLAS headers/libs. ---
      - name: Setup MSVC (vcvars)
        if: matrix.cuda
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        if: matrix.cuda
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install CUDA Toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.24
        with:
          cuda: "12.6.3"
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev"]'

      # Set CUDA/CMake build env ONLY on the cuda job (writing to $GITHUB_ENV). Doing this here
      # instead of step-level env keeps these vars ABSENT on macOS — an empty CMAKE_GENERATOR there
      # breaks the sherpa/whisper cmake builds. Ninja generator (the VS+CUDA generator can't resolve
      # CudaToolkitDir); 12.6 has no native Blackwell SASS, so real SASS for Ampere/Ada + sm_90 PTX
      # the Blackwell driver JIT-compiles at runtime (covers RTX 30/40/50).
      - name: Configure CUDA build env
        if: matrix.cuda
        shell: bash
        run: |
          echo "CMAKE_GENERATOR=Ninja" >> "$GITHUB_ENV"
          echo "CMAKE_GENERATOR_INSTANCE=" >> "$GITHUB_ENV"
          echo "CMAKE_CUDA_ARCHITECTURES=86-real;89-real;90-virtual" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: interviewlab
        run: npm ci

      # tauri-action runs `beforeBuildCommand` (npm run build) + `tauri build`, then creates/updates
      # the Release for the pushed tag and uploads the bundles (.dmg/.app on macOS; .msi/.exe on Windows).
      # No signing env is set → unsigned artifacts (intended).
      - name: Build and release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NO APPLE_* / APPLE_CERTIFICATE / WINDOWS_CERTIFICATE secrets — builds stay UNSIGNED on purpose.
          # CUDA/CMake env is set per-job via the "Configure CUDA build env" step (cuda only) so macOS
          # never inherits an empty CMAKE_GENERATOR.
        with:
          projectPath: interviewlab
          args: ${{ matrix.args }}
          # On a `v*` tag push, __VERSION__ is replaced with the tag name.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-dev', github.run_number) }}
          releaseName: "InterviewLab __VERSION__"
          releaseBody: |
            UNSIGNED installers. First launch needs a Gatekeeper (macOS) / SmartScreen (Windows)
            bypass — see docs/release.md.
          # workflow_dispatch builds attach to a DRAFT (no real tag); tag pushes publish.
          releaseDraft: ${{ github.ref_type != 'tag' }}
          # Tags with a pre-release suffix (e.g. v2.0.0-alpha.1, -rc.1) publish as a GitHub
          # pre-release; a bare vX.Y.Z publishes as a full release.
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Diagnostic: list the native dylibs sherpa-onnx-sys dropped next to the binary so the
      # macOS `frameworks` bundling list (tauri.macos.conf.json) can be verified/corrected.
      # `always()` so it still runs if the bundling step fails on a wrong/missing dylib name.
      - name: (macOS) list native dylibs
        if: ${{ always() && runner.os == 'macOS' }}
        working-directory: interviewlab/src-tauri
        run: ls -la target/${{ matrix.rust_target }}/release/*.dylib 2>/dev/null || echo "no dylibs found"

  # ---------------------------------------------------------------------------------------------
  # OPTIONAL: Windows + CUDA build. GitHub-hosted runners have NO Nvidia GPU/Toolkit, so this MUST
  # run on a SELF-HOSTED runner on the RTX box (CUDA Toolkit 13.3 + Ninja + vcvars — see Cargo.toml
  # `cuda` feature and docs/release.md). Left disabled (`if: false`) until that runner is registered.
  # ---------------------------------------------------------------------------------------------
  # build-windows-cuda:
  #   if: false   # enable once a self-hosted `[self-hosted, windows, cuda]` runner exists
  #   runs-on: [self-hosted, windows, cuda]
